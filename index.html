<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Tobiasz Kubiak</title>

    <!-- Ikony i Czcionka -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           KONFIGURACJA KOLORÓW I ZMIENNYCH
           ========================================= */
        :root {
            --bg: #050506;
            --surface: #0f0f11;
            --text-main: #ffffff;
            --text-dim: #999999;
            --accent: #FF2A2A;
            --border: rgba(255, 42, 42, 0.15);
            --grid-color: rgba(255, 0, 0, 0.25);
            --glow-color: rgba(255, 51, 0, 0.15);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --header-blur: 15px;
            --container-width: 1400px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.4;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* --- SYSTEM TŁA --- */
        .background-system {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1; overflow: hidden;
            background-color: var(--bg);
        }

        .grid-layer {
            position: absolute;
            top: -100px; left: -100px;
            width: calc(100% + 200px);
            height: calc(100% + 200px);
            background-image: radial-gradient(var(--grid-color) 1px, transparent 0);
            background-size: 50px 50px;
            animation: gridFlow 10s linear infinite;
        }

        @keyframes gridFlow {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }

        .ambient-glow {
            position: absolute;
            top: 20%; left: 20%;
            width: 90vw; height: 90vw;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
            animation: glowPulse 7s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes glowPulse {
            from { transform: translate(-15%, -15%) scale(1); opacity: 0.3; }
            to { transform: translate(15%, 15%) scale(1.2); opacity: 0.7; }
        }

        /* --- KONTENER --- */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 40px;
            position: relative;
        }

        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            backdrop-filter: blur(var(--header-blur));
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-weight: 700; font-size: 1.1rem; letter-spacing: 4px; color: var(--accent); }

        #about {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.01);
        }

        .about-text {
            padding: 80px 40px 80px 0;
            border-right: 1px solid var(--border);
        }

        .about-text h1 {
            font-size: clamp(2.2rem, 6vw, 5rem);
            line-height: 1.2;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 25px;
            word-wrap: break-word;
        }

        .highlight {
            background: var(--accent);
            color: #000;
            padding: 4px 12px;
            display: inline;
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
        }

        .about-img-container {
            background: var(--surface);
            display: flex;
            border-left: 1px solid var(--border);
            overflow: hidden;
            height: 100%;
        }

        .about-img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: top center; 
        }

        .section-header {
            padding: 30px 40px;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(256, 42, 42, 0.05);
            gap: 20px;
        }

        .section-header h2 { font-size: clamp(1.2rem, 3vw, 1.6rem); text-transform: uppercase; }

        #project-count {
            color: #000;
            background: var(--accent);
            padding: 5px 15px;
            font-weight: 700;
            white-space: nowrap;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* --- GRID PROJEKTÓW --- */
        #projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-left: 1px solid var(--border);
            padding-bottom: 100px;
        }

        .project-card {
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 30px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            background: transparent;
            will-change: transform;
        }

        .project-card:hover {
            background: rgba(255, 42, 42, 0.08);
            border-color: var(--accent);
            transform: scale(1.02);
            z-index: 10;
            box-shadow: 0 10px 30px rgba(255, 42, 42, 0.15);
        }

        .project-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .project-card h3 { font-size: 1.4rem; text-transform: uppercase; margin-bottom: 8px; }

        .project-card .card-date {
            font-size: 11px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stack-tag {
            font-size: 10px;
            padding: 2px 8px;
            border: 1px solid var(--border);
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 700;
            margin-right: 5px;
            margin-top: 5px;
            display: inline-block;
        }

        /* --- VIDEO --- */
        .video-wrapper {
            position: relative;
            width: 90%;
            margin: 0 auto 40px auto;
            aspect-ratio: 16 / 9;
            background: transparent;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .video-wrapper iframe, .video-wrapper video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100.5%;
            border: none;
            display: block;
            object-fit: cover;
        }

        /* --- FOOTER --- */
        footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--accent);
            color: #000;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1000;
            font-weight: 900;
        }

        .social-links { display: flex; gap: 20px; }
        .social-links a { color: #000; font-size: 22px; text-decoration: none; transition: 0.2s; }
        .social-links a:hover { transform: translateY(-3px); }

        .contact-trigger {
            background: #000;
            color: var(--accent);
            padding: 10px 25px;
            text-decoration: none;
            font-size: 11px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .contact-trigger .btn-icon { display: none; }

        /* --- DETALE --- */
        #project-detail { display: none; padding: 60px 0 120px 0; animation: fadeIn 0.5s ease; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        .back-btn { background: var(--surface); border: 1px solid var(--accent); color: var(--accent); padding: 12px 24px; cursor: pointer; margin-bottom: 40px; font-weight: 700; }
        .tech-pill { display: inline-block; border: 1px solid var(--accent); padding: 4px 12px; font-size: 10px; margin: 0 8px 8px 0; font-weight: 700; color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- RESPONSIVE --- */
        @media (max-width: 1100px) {
            .container { padding: 0 30px; }
            #projects-grid { grid-template-columns: repeat(2, 1fr); }
            .section-header { padding: 30px; }
        }

        @media (max-width: 900px) {
            #about { grid-template-columns: 1fr; }
            .about-text { border-right: none; padding: 60px 20px 40px 20px; border-bottom: 1px solid var(--border); }
            .about-img-container { height: 450px; border-left: none; }
            .detail-grid { grid-template-columns: 1fr; gap: 40px; }
            .video-wrapper { width: 100%; }
        }

        @media (max-width: 700px) {
            footer {
                padding: 0 20px;
                justify-content: center;
                gap: 40px;
            }
            #footer-info { display: none; }
            
            /* Zamiana tekstu na ikonkę */
            .contact-trigger {
                width: 45px;
                height: 45px;
                padding: 0;
                border-radius: 50%;
            }
            .contact-trigger .btn-text { display: none; }
            .contact-trigger .btn-icon { display: block; font-size: 18px; }
        }

        @media (max-width: 600px) {
            .container { padding: 0 15px; }
            header { padding: 15px 5px; }
            .logo { font-size: 0.85rem; letter-spacing: 2px; }
            .about-text { padding: 40px 10px; }
            .section-header { flex-direction: column; align-items: flex-start; padding: 20px 15px; }
            #projects-grid { grid-template-columns: 1fr; border-left: none; }
            .project-card { border-right: none; padding: 25px 15px; }
        }
    </style>
</head>

<body>

    <div class="background-system">
        <div class="grid-layer"></div>
        <div class="ambient-glow"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">TOBIASZ KUBIAK | PORTFOLIO</div>
        </header>

        <div id="home-view">
            <section id="about">
                <div class="about-text">
                    <p style="color: var(--accent); font-weight: 700; margin-bottom: 15px; font-size: 12px;">// USER_DESCRIPTION</p>
                    <h1 id="about-name">Ładowanie...</h1>
                    <p id="about-desc" style="max-width: 550px; color: var(--text-dim); font-size: 1.1rem;"></p>
                </div>
                <div class="about-img-container">
                    <img id="about-photo" src="" alt="Me" class="about-img">
                </div>
            </section>

            <div class="section-header">
                <h2>// SHOWCASE_PROJECTS</h2>
                <div id="project-count">COUNT: --</div>
            </div>
            <section id="projects-grid"></section>
        </div>

        <div id="project-detail">
            <button class="back-btn" onclick="showHome()">← RETURN</button>
            <div id="detail-content"></div>
        </div>
    </div>

    <footer>
        <div id="footer-info">TOBIASZ KUBIAK | 2026</div>
        <div class="social-links" id="socials"></div>
        <a href="#" id="mailto" class="contact-trigger">
            <span class="btn-text">SEND_MESSAGE</span>
            <span class="btn-icon"><i class="fas fa-paper-plane"></i></span>
        </a>
    </footer>

    <script>
        let siteData = null;

        async function init() {
            try {
                const response = await fetch('data.json');
                siteData = await response.json();
                renderAbout();
                renderProjects();
                renderFooter();
            } catch (e) { console.error("Data.json missing."); }
        }

        function renderAbout() {
            document.getElementById('about-name').innerHTML = `<span class="highlight">${siteData.about.name}</span>`;
            document.getElementById('about-desc').innerText = siteData.about.description;
            document.getElementById('about-photo').src = siteData.about.photo;
        }

        function renderProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';
            document.getElementById('project-count').innerText = `COUNT: 0${siteData.projects.length}`;
            siteData.projects.forEach((p) => {
                const card = document.createElement('div');
                card.className = 'project-card';
                const stackHTML = p.stack.map(s => `<span class="stack-tag">${s}</span>`).join('');
                card.innerHTML = `
                    <span class="card-date">${p.date}</span>
                    <img src="${p.thumbnail}" alt="${p.title}" loading="lazy">
                    <h3>${p.title}</h3>
                    <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 5px;">${p.description}</p>
                    <div class="card-stack">${stackHTML}</div>
                `;
                card.onclick = () => showProject(p.id);
                grid.appendChild(card);
            });
        }

        function showProject(id) {
            const p = siteData.projects.find(proj => proj.id === id);
            const detail = document.getElementById('project-detail');
            const home = document.getElementById('home-view');

            let videoHTML = "";
            if (p.video_url) {
                let url = p.video_url;
                if (url.includes('youtube.com/watch?v=')) {
                    url = url.replace('youtube.com/watch?v=', 'youtube.com/embed/');
                } else if (url.includes('youtu.be/')) {
                    url = url.replace('youtu.be/', 'www.youtube.com/embed/');
                }

                if (url.includes('youtube.com') || url.includes('vimeo.com')) {
                    videoHTML = `<div class="video-wrapper"><iframe src="${url}" allowfullscreen></iframe></div>`;
                } else {
                    videoHTML = `<div class="video-wrapper"><video controls src="${url}"></video></div>`;
                }
            }

            document.getElementById('detail-content').innerHTML = `
                <div class="detail-grid">
                    <div>
                        <h1 style="font-size: clamp(2.2rem, 8vw, 4.5rem); text-transform: uppercase; line-height: 1; margin-bottom: 40px;">${p.title}</h1>
                        <div style="margin-bottom: 40px;">${p.stack.map(s => `<span class="tech-pill">${s}</span>`).join('')}</div>
                        <p style="font-size: 1.2rem; color: var(--text-dim); margin-bottom: 30px; white-space: pre-line;">${p.longDescription}</p>
                        <p style="font-weight: 700; color: var(--accent);">DATE: ${p.date}</p>
                    </div>
                    <div>
                        ${videoHTML}
                        ${p.images.map(img => `<img src="${img}" style="width:100%; border: 1px solid var(--border); margin-bottom: 30px;" loading="lazy">`).join('')}
                    </div>
                </div>
            `;
            home.style.display = 'none';
            detail.style.display = 'block';
            window.scrollTo(0, 0);
        }

        function showHome() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('project-detail').style.display = 'none';
        }

        function renderFooter() {
            const soc = siteData.contact.socials;
            document.getElementById('socials').innerHTML = `
                <a href="${soc.linkedin}" target="_blank" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                <a href="${soc.facebook}" target="_blank" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="${soc.itch}" target="_blank" title="Itch.io"><i class="fab fa-itch-io"></i></a>
            `;
            document.getElementById('mailto').href = `mailto:${siteData.contact.email}`;
        }

        init();
    </script>
</body>

</html>
